<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.header{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:500}
.tabs{display:flex;gap:4px}
.tab{padding:6px 14px;border-radius:20px;font-size:13px;border:none;cursor:pointer;background:transparent;color:#666;font-weight:400}
.tab.active{background:#185FA5;color:#fff;font-weight:500}
.section{display:none;padding:16px 20px}
.section.active{display:block}
.card{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:500;color:#666;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
label{font-size:13px;color:#666;display:block;margin-bottom:4px}
input,select{width:100%;padding:9px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:15px;background:#fff;color:#1a1a1a;-webkit-appearance:none}
input:focus,select:focus{outline:2px solid #185FA5;border-color:transparent}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vfc-row{display:flex;align-items:center;gap:8px}
.vfc-badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.vfc-ok{background:#EAF3DE;color:#3B6D11}
.vfc-med{background:#FAEEDA;color:#854F0B}
.vfc-low{background:#FCEBEB;color:#A32D2D}
.btn-primary{width:100%;padding:13px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;margin-top:4px}
.btn-primary:active{opacity:0.85}
.btn-secondary{width:100%;padding:11px;background:#fff;color:#185FA5;border:0.5px solid #185FA5;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px}
.plan-output{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:16px;min-height:200px}
.plan-placeholder{text-align:center;padding:40px 20px;color:#999}
.plan-placeholder .icon{font-size:40px;margin-bottom:12px}
.loading{text-align:center;padding:40px 20px;color:#666}
.spinner{width:32px;height:32px;border:2px solid #e0e0e0;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.plan-content{font-size:14px;line-height:1.7;color:#1a1a1a}
.plan-content h2{font-size:16px;font-weight:500;margin:16px 0 8px;color:#185FA5}
.plan-content h3{font-size:14px;font-weight:500;margin:12px 0 4px}
.plan-content ul{padding-left:18px;margin:4px 0}
.plan-content li{margin:2px 0}
.plan-content strong{font-weight:500}
.meta-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.meta-tag{background:#E6F1FB;color:#185FA5;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.allures-card{background:#f8f8f5;border-radius:8px;padding:12px;margin-top:8px}
.allure-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.allure-row:last-child{border-bottom:none}
.allure-label{color:#666}
.allure-val{font-weight:500;color:#185FA5}
</style>
</head>

<script>
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['profil','plan'][i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id==='section-'+t));
}

function updateVfcBadge(){
  const vfc=parseFloat(document.getElementById('f-vfc').value);
  const base=parseFloat(document.getElementById('f-vfc-base').value);
  const badge=document.getElementById('vfc-badge');
  if(!vfc||!base){badge.style.display='none';return;}
  const ratio=(vfc-base)/base*100;
  badge.style.display='inline-block';
  if(ratio>=-5){badge.className='vfc-badge vfc-ok';badge.textContent='Forme OK';}
  else if(ratio>=-10){badge.className='vfc-badge vfc-med';badge.textContent='Modéré';}
  else{badge.className='vfc-badge vfc-low';badge.textContent='Fatigue';}
}

function getData(){
  return {
    course:document.getElementById('f-course').value,
    date:document.getElementById('f-date').value,
    chrono:document.getElementById('f-chrono').value,
    vma:document.getElementById('f-vma').value,
    vo2:document.getElementById('f-vo2').value,
    fcmax:document.getElementById('f-fcmax').value,
    fcrep:document.getElementById('f-fcrep').value,
    seuil:document.getElementById('f-seuil').value,
    vfc:document.getElementById('f-vfc').value,
    vfcBase:document.getElementById('f-vfc-base').value,
    rp5:document.getElementById('f-rp5').value,
    rp10:document.getElementById('f-rp10').value,
    rpsemi:document.getElementById('f-rpsemi').value,
    rpmarathon:document.getElementById('f-rpmarathon').value,
    seances:document.getElementById('f-seances').value,
    km:document.getElementById('f-km').value,
    blessures:document.getElementById('f-blessures').value,
    notes:document.getElementById('f-notes').value
  };
}

function calcAllures(d){
  if(!d.vma) return null;
  const vma=parseFloat(d.vma);
  const toMinKm=v=>{const t=60/v;const m=Math.floor(t);const s=Math.round((t-m)*60);return m+':'+(s<10?'0':'')+s+' /km'};
  return {
    'Endurance fondamentale (70% VMA)':toMinKm(vma*0.70),
    'Allure seuil (85% VMA)':toMinKm(vma*0.85),
    'Fractionné long (92% VMA)':toMinKm(vma*0.92),
    'Fractionné court (102% VMA)':toMinKm(vma*1.02),
  };
}

function buildPrompt(d){
  const vfcStatus=()=>{
    if(!d.vfc||!d.vfcBase) return '';
    const r=(parseFloat(d.vfc)-parseFloat(d.vfcBase))/parseFloat(d.vfcBase)*100;
    if(r>=-5) return 'Forme du jour : BONNE';
    if(r>=-10) return 'Forme du jour : MODEREE — adapter intensité';
    return 'Forme du jour : FATIGUE — alléger la semaine';
  };
  const weeksLeft=()=>{
    if(!d.date) return '?';
    const diff=Math.round((new Date(d.date)-new Date())/(1000*60*60*24*7));
    return diff>0?diff:'?';
  };
  return `Tu es un coach running expert. Génère un plan d'entraînement personnalisé en français.

PROFIL :
- Objectif : ${d.course} le ${d.date||'?'} (dans ~${weeksLeft()} semaines), chrono visé : ${d.chrono||'non précisé'}
- VMA : ${d.vma||'?'} km/h | VO2max : ${d.vo2||'?'} ml/kg/min
- FC max/repos : ${d.fcmax||'?'} / ${d.fcrep||'?'} bpm | Seuil lactique : ${d.seuil||'?'} /km
- ${vfcStatus()}
- Records : 5k ${d.rp5||'?'} | 10k ${d.rp10||'?'} | Semi ${d.rpsemi||'?'} | Marathon ${d.rpmarathon||'?'}
- Volume actuel : ${d.km||'?'} km/sem en ${d.seances} séances/sem
- Contraintes : ${d.blessures||'aucune'} | Notes : ${d.notes||'aucune'}

CONSIGNES :
1. Bilan rapide du profil (2-3 phrases)
2. Plan semaine par semaine jusqu'à la course avec ## Semaine X comme titre
3. Pour chaque semaine : objectif, séances détaillées (type + distance + allure), volume total
4. Si fatigue détectée (VFC), adapter la semaine en cours
5. Terminer par 3 conseils personnalisés`;
}

async function genererPlan(){
  switchTab('plan');
  const out=document.getElementById('plan-output');
  const meta=document.getElementById('plan-meta');
  const alluresDiv=document.getElementById('plan-allures');
  const refreshBtn=document.getElementById('btn-refresh');
  out.innerHTML='<div class="loading"><div class="spinner"></div><p>Génération en cours...</p></div>';
  meta.style.display='none';
  alluresDiv.style.display='none';
  refreshBtn.style.display='none';
  const d=getData();
  const allures=calcAllures(d);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:buildPrompt(d)}]
      })
    });
    const data=await res.json();
    const text=data.content.map(b=>b.text||'').join('');
    const html=text
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>[^\n]+<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>')
      .replace(/\n\n/g,'<br><br>')
      .trim();
    out.innerHTML='<div class="plan-content">'+html+'</div>';
    const label={'semi':'Semi-marathon','marathon':'Marathon','10k':'10 km','5k':'5 km'}[d.course];
    meta.innerHTML=(label?`<span class="meta-tag">${label}</span>`:'')+
      (d.chrono?`<span class="meta-tag">Objectif ${d.chrono}</span>`:'')+
      (d.date?`<span class="meta-tag">${new Date(d.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</span>`:'');
    meta.style.display='flex';
    if(allures){
      const rows=Object.entries(allures).map(([k,v])=>`<div class="allure-row"><span class="allure-label">${k}</span><span class="allure-val">${v}</span></div>`).join('');
      alluresDiv.innerHTML=`<div class="card"><div class="card-title">Allures cibles</div><div class="allures-card">${rows}</div></div>`;
      alluresDiv.style.display='block';
    }
    refreshBtn.style.display='block';
  }catch(e){
    out.innerHTML='<div class="plan-placeholder"><p>Erreur de connexion. Réessaie.</p></div>';
  }
}

// Sauvegarde automatique dans localStorage
const fields=['f-course','f-date','f-chrono','f-vma','f-vo2','f-fcmax','f-fcrep','f-seuil','f-vfc','f-vfc-base','f-rp5','f-rp10','f-rpsemi','f-rpmarathon','f-seances','f-km','f-blessures','f-notes'];
window.addEventListener('load',()=>{
  fields.forEach(id=>{
    const el=document.getElementById(id);
    const saved=localStorage.getItem(id);
    if(saved&&el) el.value=saved;
    if(el) el.addEventListener('input',()=>localStorage.setItem(id,el.value));
  });
  updateVfcBadge();
});
</script>
